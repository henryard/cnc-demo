<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>逐点比较法插补演示</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📐</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

:root {
  --bg:        #f3f4f6;
  --surface:   #ffffff;
  --surface2:  #f9fafb;
  --border:    #e5e7eb;
  --border2:   #d1d5db;
  --text:      #111827;
  --text-mid:  #4b5563;
  --text-dim:  #6b7280;

  --accent:    #2563eb;
  --accent-lt: #eff6ff;
  --purple:    #7c3aed;
  --purple-lt: #f5f3ff;
  --red:       #dc2626;
  --orange:    #ea580c;
  --orange-lt: #fff7ed;
  --green:     #16a34a;
  --green-lt:  #f0fdf4;
  --x-color:   #2563eb;
  --y-color:   #0d9488;

  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
  --shadow:    0 4px 6px -1px rgba(0,0,0,0.08);
  --radius:    8px;

  --ios-blue:   #007AFF;
  --ios-orange: #FF9500;
  --ios-gray:   #F2F2F7;
  --ios-text:   #1C1C1E;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;}
body{height:100vh;overflow:hidden;}
button,input,select,a{touch-action:manipulation;}

.layout{display:grid;grid-template-columns:clamp(260px,22vw,340px) minmax(400px,1fr) clamp(340px,28vw,500px);height:100vh;}

/* ── 左侧面板 ── */
.panel-left{background:var(--surface);border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;height:100vh;overflow:hidden;box-shadow:4px 0 15px rgba(0,0,0,0.02);z-index:10;}
.panel-top{display:flex;flex-direction:column;gap:12px;flex:1 1 0;min-height:0;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:8px;}
.panel-top::-webkit-scrollbar{display:none;}

.back-link{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;font-size:13px;font-weight:600;color:var(--text-dim);text-decoration:none;padding:6px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;transition:all 0.2s ease;box-shadow:var(--shadow-sm);}
.back-link:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-lt);}
.back-link svg{transition:transform 0.2s ease;}
.back-link:hover svg{transform:translateX(-3px);}

.stitle{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text-mid);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.stitle::before{content:'';width:4px;height:12px;background:var(--accent);border-radius:2px;}
.mode-sw{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:4px;display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.mode-btn{padding:8px 4px;background:transparent;color:var(--text-mid);border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s ease;}
.mode-btn.active{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow-sm);}
.ilabel{font-size:12px;font-weight:600;color:var(--text-mid);margin-bottom:4px;}
.ifield{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:14px;font-family:'JetBrains Mono',monospace;font-weight:700;width:100%;transition:all .2s;}
.ifield:focus{outline:none;background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt);}
/* 去掉 number 输入框上下调节箭头 */
.ifield[type="number"]{-moz-appearance:textfield;appearance:textfield;}
.ifield[type="number"]::-webkit-inner-spin-button,
.ifield[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}

.fbox{background:var(--accent-lt);border:1px solid #bfdbfe;border-radius:6px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.7;color:var(--text-mid);margin-top:10px;}
.fh{color:var(--accent);font-weight:700;font-size:12.5px;margin-bottom:4px;}
.fvx{color:var(--x-color);font-weight:700;}
.fvy{color:var(--y-color);font-weight:700;}
.qbtn{padding:6px 2px;background:var(--surface2);border:1px solid var(--border);color:var(--text-mid);border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.qbtn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-lt);}
.spslider{flex:1;-webkit-appearance:none;height:4px;background:var(--border2);border-radius:2px;outline:none;}
.spslider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:var(--surface);border:2px solid var(--accent);border-radius:50%;cursor:pointer;box-shadow:var(--shadow-sm);}

/* 象限预设按钮 */
.quad-presets{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px;}
.qp-btn{padding:5px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;color:var(--text-mid);transition:all .2s;text-align:center;}
.qp-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt);}

/* 象限徽章 */
.quad-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:700;background:var(--accent-lt);color:var(--accent);border:1px solid #bfdbfe;margin-left:6px;}

/* n-hint */
.n-hint{font-size:11px;color:var(--green);font-weight:600;margin-top:4px;padding:3px 6px;background:var(--green-lt);border-radius:4px;display:none;}
.n-hint.show{display:block;}

/* ── 控制按钮 ── */
.action-area{flex:0 0 auto;padding-top:14px;display:flex;flex-direction:column;gap:10px;}
.brow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{padding:12px 10px;border-radius:14px;border:none;cursor:pointer;user-select:none;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC",sans-serif;font-size:14px;font-weight:600;transition:transform 0.1s ease,box-shadow 0.2s ease,background 0.2s ease;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(0.95);}
.btn-reset{background:var(--ios-gray);color:#8E8E93;}
.btn-reset:hover{background:#E5E5EA;color:var(--ios-text);}
.btn-apply{background:#E0E7FF;color:var(--ios-blue);}
.btn-apply:hover{background:#C7D2FE;}
.btn-p{background:var(--ios-blue);color:#fff;box-shadow:0 4px 10px rgba(0,122,255,0.2);}
.btn-p:hover{background:#0062CC;box-shadow:0 6px 14px rgba(0,122,255,0.3);}
.btn-s{background:var(--ios-orange);color:#fff;box-shadow:0 4px 10px rgba(255,149,0,0.2);}
.btn-s:hover{background:#E08300;box-shadow:0 6px 14px rgba(255,149,0,0.3);}

/* ── 中间面板 ── */
.panel-center{background:var(--surface2);display:flex;flex-direction:column;border-right:1px solid var(--border);height:100vh;}
.ctoolbar{height:60px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 2px rgba(0,0,0,0.02);z-index:6;flex:0 0 auto;}
.ctitle{font-size:18px;font-weight:700;color:var(--text);letter-spacing:0.5px;}
.c-actions{display:flex;align-items:center;gap:12px;}
.top-badge{display:inline-block;background:var(--accent-lt);color:var(--accent);padding:4px 10px;border-radius:12px;font-size:13px;font-weight:600;transition:all 0.2s ease;}

.sbar{height:64px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:5;flex:0 0 auto;overflow:hidden;}
.si{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;white-space:nowrap;flex-shrink:0;}
.sk{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.sv{font-size:16px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--text);display:flex;align-items:center;height:22px;}

.legend-wrap{height:44px;padding:0 20px;background:var(--surface2);z-index:4;flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.legend-group{display:flex;align-items:center;gap:16px;white-space:nowrap;flex-shrink:0;justify-content:center;}
.leg{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-mid);font-weight:500;}
.ldot{width:12px;height:12px;border-radius:50%;display:inline-block;flex-shrink:0;}
.lline{width:24px;height:3px;border-radius:2px;display:inline-block;flex-shrink:0;}
.lsq{width:12px;height:12px;border-radius:2px;display:inline-block;flex-shrink:0;}

.canvas-wrap{flex:1 1 0;width:100%;position:relative;min-height:0;overflow:hidden;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;}

/* ── 右侧面板 ── */
.panel-right{background:var(--surface);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.rhead{height:60px;padding:0 24px;background:var(--surface);color:var(--text);font-size:16px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex:0 0 auto;}
.rhead-actions{display:flex;align-items:center;gap:12px;}
.rhead-badge{font-size:12px;background:var(--accent-lt);color:var(--accent);padding:4px 10px;border-radius:12px;font-weight:600;}

.fs-btn{background:var(--surface);border:1px solid var(--border2);color:var(--text-mid);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow-sm);transition:all .2s ease;}
.fs-btn:hover{background:var(--accent-lt);border-color:var(--accent);color:var(--accent);}

.twrap{flex:1 1 0;min-height:0;overflow-y:auto;overflow-x:auto;padding:0;}
.stab{width:100%;border-collapse:collapse;font-size:12px;}
.stab th{padding:10px 4px;background:var(--surface2);color:var(--text-dim);font-weight:600;text-align:center;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;position:sticky;top:0;z-index:1;}
.stab td{padding:7px 4px;text-align:center;font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border);font-size:12px;white-space:nowrap;}
.stab tr:hover td{background:var(--surface2);}
.stab tr.cur td{background:var(--accent-lt);color:var(--accent);font-weight:700;}
.stab tr.done td{color:var(--text-mid);}

.sdetail{flex:0 0 300px;height:300px;box-sizing:border-box;overflow-y:auto;border-top:1px solid var(--border);padding:18px 22px;background:var(--surface);box-shadow:0 -4px 15px rgba(0,0,0,0.03);z-index:10;}
.sdtitle{font-size:15px;font-weight:700;letter-spacing:1px;color:var(--accent);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.drow{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:14px;}
.dlbl{color:var(--text-mid);display:flex;align-items:center;gap:10px;font-weight:500;}
.dnum{width:22px;height:22px;background:var(--surface2);color:var(--text-dim);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.dval{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;}
.dnote{margin-top:10px;padding:8px 12px;background:var(--surface2);border-left:4px solid var(--accent);border-radius:4px 8px 8px 4px;font-size:12px;color:var(--text-mid);font-family:'JetBrains Mono',monospace;line-height:1.6;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.running{animation:pulse 1.2s infinite;}
.scr::-webkit-scrollbar{width:6px;height:6px;}
.scr::-webkit-scrollbar-track{background:transparent;}
.scr::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── 移动端适配 ── */
@media(max-width:1024px){
  html,body{height:auto!important;min-height:100vh;overflow-y:auto!important;overflow-x:hidden!important;padding-bottom:100px;}
  .layout{display:flex;flex-direction:column;height:auto;}
  .panel-left,.panel-center,.panel-right{height:auto!important;overflow:visible!important;}
  .panel-left{order:1;width:100%;display:block;border-right:none;border-bottom:1px solid var(--border);box-shadow:none;padding:20px 12px 24px 12px;}
  .panel-top{display:flex;flex-direction:column;gap:16px;height:auto;overflow:visible;}
  .panel-center{order:0;width:100%;border-right:none;border-bottom:1px solid var(--border);display:flex;flex-direction:column;padding:0;}
  .ctoolbar{padding:12px 16px;height:auto;}
  .top-badge{font-size:11px;padding:4px 8px;}
  .desktop-only{display:none!important;}
  .sbar{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:0;padding:12px 0;height:auto;}
  .si{border-right:1px solid var(--border2);padding:0 1px;min-width:0;overflow:hidden;}
  .si:last-child{border-right:none;}
  .sk{font-size:clamp(9px,2vw,11px);margin-bottom:2px;}
  .sv{font-size:clamp(11px,2.5vw,14px);height:auto;letter-spacing:-0.5px;}
  .legend-wrap{padding:10px 8px;height:auto;min-height:44px;border-bottom:none;background:transparent;width:100%;box-sizing:border-box;justify-content:center;}
  .legend-group{font-size:10px;gap:6px 10px;flex-wrap:wrap;justify-content:center;white-space:normal;}
  .canvas-wrap{flex:none;height:380px!important;width:100%;}
  .fs-btn{display:none!important;}
  .panel-right{order:3;width:100%;display:block;}
  .rhead{padding:16px;height:auto;}
  .twrap{max-height:400px;overflow-y:auto;}
  .sdetail{height:auto;max-height:none;padding:20px 16px;}
  .action-area{position:fixed;bottom:0;left:0;width:100%;background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:10px 8px;padding-bottom:calc(10px + env(safe-area-inset-bottom));box-shadow:0 -4px 24px rgba(0,0,0,0.06);z-index:1000;border-top:1px solid rgba(0,0,0,0.06);display:flex;flex-direction:row;gap:0;}
  .action-area .brow{display:contents;}
  .btn{flex:1;padding:12px 0;margin:0 4px;font-size:14px;border-radius:14px;justify-content:center;}
}
</style>
</head>
<body>

<div class="layout">
<!-- ────────── 左侧面板 ────────── -->
<div class="panel-left">
  <div class="panel-top">
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      返回导航主页
    </a>

    <div>
      <div class="stitle">插补类型</div>
      <div class="mode-sw">
        <button class="mode-btn active" id="bml" onclick="setMode('line')">📐 直线插补</button>
        <button class="mode-btn" id="bma" onclick="setMode('arc')">⭕ 圆弧插补</button>
      </div>
    </div>

    <!-- ── 直线参数 ── -->
    <div id="lc">
      <div class="stitle">直线参数 <span id="line-quad-badge" class="quad-badge">第I象限</span></div>
      <div class="card">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          <div><div class="ilabel">终点 Xe</div><input class="ifield" type="number" id="lxe" value="6" oninput="updateLineQuad()"></div>
          <div><div class="ilabel">终点 Ye</div><input class="ifield" type="number" id="lye" value="4" oninput="updateLineQuad()"></div>
        </div>
        <div style="font-size:11px;color:var(--text-dim);font-weight:600;margin-bottom:4px;">象限快捷预设</div>
        <div class="quad-presets">
          <button class="qp-btn" onclick="setLinePreset(6,4)">第I象限 (6,4)</button>
          <button class="qp-btn" onclick="setLinePreset(-5,3)">第II象限 (-5,3)</button>
          <button class="qp-btn" onclick="setLinePreset(-4,-6)">第III象限 (-4,-6)</button>
          <button class="qp-btn" onclick="setLinePreset(3,-5)">第IV象限 (3,-5)</button>
        </div>
        <div class="fbox" id="line-fbox">
          <div class="fh" id="lf-title">偏差函数（第I象限）</div>
          <div id="lf-body" style="line-height:1.8"></div>
        </div>
      </div>
    </div>

    <!-- ── 圆弧参数 ── -->
    <div id="ac" style="display:none">
      <div class="stitle">圆弧参数 <span id="arc-quad-badge" class="quad-badge">第I象限</span></div>
      <div class="card">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
          <button class="qbtn active" id="dir-nr" onclick="setDir('NR',this)">↺ 逆圆 NR</button>
          <button class="qbtn" id="dir-sr" onclick="setDir('SR',this)">↻ 顺圆 SR</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px">
          <div><div class="ilabel">起X</div><input class="ifield" type="number" id="axs" value="5" oninput="updateArcInfo()"></div>
          <div><div class="ilabel">起Y</div><input class="ifield" type="number" id="ays" value="0" oninput="updateArcInfo()"></div>
          <div><div class="ilabel">终X</div><input class="ifield" type="number" id="axe" value="0" oninput="updateArcInfo()"></div>
          <div><div class="ilabel">终Y</div><input class="ifield" type="number" id="aye" value="5" oninput="updateArcInfo()"></div>
        </div>
        <div style="font-size:11px;color:var(--text-dim);font-weight:600;margin-bottom:4px;">象限快捷预设</div>
        <div class="quad-presets">
          <button class="qp-btn" onclick="setArcPreset(5,0,0,5,'NR')">NR I→I (5,0)→(0,5)</button>
          <button class="qp-btn" onclick="setArcPreset(0,5,-5,0,'NR')">NR II (0,5)→(-5,0)</button>
          <button class="qp-btn" onclick="setArcPreset(5,0,0,-5,'SR')">SR IV (5,0)→(0,-5)</button>
          <button class="qp-btn" onclick="setArcPreset(0,5,5,0,'SR')">SR I (0,5)→(5,0)</button>
        </div>
        <div class="fbox" id="arc-fbox">
          <div class="fh">偏差 F = Xᵢ² + Yᵢ² − R²</div>
          <div id="arc-fb" style="line-height:1.8;font-size:11px;"></div>
        </div>
      </div>
    </div>

    <div>
      <div class="stitle">演示速度</div>
      <div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:16px;">
        <span style="font-size:13px;color:var(--text-dim);font-weight:600">慢</span>
        <input type="range" class="spslider" id="speed" min="100" max="2000" value="800">
        <span style="font-size:13px;color:var(--text-dim);font-weight:600">快</span>
      </div>
    </div>
  </div>

  <div class="action-area">
    <div class="brow">
      <button class="btn btn-reset" onclick="resetSim()">↺ 重置</button>
      <button class="btn btn-apply" onclick="initSim()">⚙ 应用</button>
    </div>
    <div class="brow">
      <button class="btn btn-p" id="bta" onclick="startAuto()">▶ 自动</button>
      <button class="btn btn-s" onclick="stepOnce()">⏭ 单步</button>
    </div>
  </div>
</div>

<!-- ────────── 中间画布区 ────────── -->
<div class="panel-center">
  <div class="ctoolbar">
    <span class="ctitle">📐 逐点比较法插补</span>
    <div class="c-actions">
      <span class="top-badge" id="st-badge">等待开始</span>
      <button id="fsBtn" class="fs-btn desktop-only" onclick="toggleFullScreen()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        <span>全屏</span>
      </button>
    </div>
  </div>

  <div class="sbar">
    <div class="si"><span class="sk">步骤</span><span class="sv" id="ss">—</span></div>
    <div class="si"><span class="sk">X</span><span class="sv" id="sx" style="color:var(--x-color)">—</span></div>
    <div class="si"><span class="sk">Y</span><span class="sv" id="sy" style="color:var(--y-color)">—</span></div>
    <div class="si"><span class="sk">偏差 F</span><span class="sv" id="sf">—</span></div>

  <div class="legend-wrap">

      <div class="leg"><span class="ldot" style="background:var(--orange);border:1.5px solid #fff;box-shadow:0 0 0 1px var(--border2)"></span>刀具</div>
      <div class="leg"><span class="lsq" style="background:var(--x-color);opacity:0.6"></span>±X进给</div>
      <div class="leg"><span class="lsq" style="background:var(--y-color);opacity:0.6"></span>±Y进给</div>

<!-- ────────── 右侧记录面板 ────────── -->
<div class="panel-right">

    <span>插补步骤记录</span>

        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>

      </button>

          <th>步</th><th>F值</th><th>判别</th><th>进给</th><th>新F</th>
          <th>X</th><th>Y</th><th>余步N</th>

  </div>

<script>
// ================================================================
// 工具函数
// ================================================================
function v(id){return document.getElementById(id).value;}
function num(id,def){let val=v(id);return val===''?def:Number(val);}
function clamp(n,a,b){return Math.max(a,Math.min(b,n));}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let mode='line', arcDir='NR';
let steps=[],cur=-1,timer=null,running=false,inited=false;
let canvasW=0,canvasH=0;

// ================================================================
// 全屏
// ================================================================
const enterFsIcon=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>`;
const exitFsIcon=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>`;
function toggleFullScreen(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(e=>console.error(e));}
  else if(document.exitFullscreen){document.exitFullscreen();}
}
document.addEventListener('fullscreenchange',()=>{
  ['fsBtn','fsBtn2'].forEach(id=>{
    let btn=document.getElementById(id);
    if(btn)btn.innerHTML=(document.fullscreenElement?exitFsIcon:enterFsIcon)+'<span>'+(document.fullscreenElement?'退出':'全屏')+'</span>';
  });
  setTimeout(resize,100);
});

// ================================================================
// 象限工具
// ================================================================
function getLineQuadrant(xe,ye){
  if(xe>0&&ye>0)return{label:'第I象限',num:1};
  if(xe<0&&ye>0)return{label:'第II象限',num:2};
  if(xe<0&&ye<0)return{label:'第III象限',num:3};
  if(xe>0&&ye<0)return{label:'第IV象限',num:4};
  return{label:'轴上',num:0};
}
function getArcQuadrant(x,y){
  if(x>0&&y>=0)return 1;
  if(x<=0&&y>0)return 2;
  if(x<0&&y<=0)return 3;
  if(x>=0&&y<0)return 4;
  return 1;
}

// ================================================================
// 直线参数面板更新
// ================================================================
function updateLineQuad(){
  let xe=num('lxe',6),ye=num('lye',4);
  let q=getLineQuadrant(xe,ye);
  let badge=document.getElementById('line-quad-badge');
  if(badge)badge.textContent=q.label;

  // 根据象限显示正确的偏差公式（坐标变换后均转化为第一象限）
  // 逐点比较法直线插补：各象限坐标变换为 |Xe|,|Ye|，偏差函数相同
  // 但进给方向随象限变化
  let signX=xe>=0?'+':'-', signY=ye>=0?'+':'-';
  let absXe=Math.abs(xe),absYe=Math.abs(ye);
  let titleEl=document.getElementById('lf-title');
  let bodyEl=document.getElementById('lf-body');
  if(titleEl)titleEl.textContent=`偏差函数（${q.label}）`;
  if(bodyEl)bodyEl.innerHTML=
    `F = |Xe|·Y − |Ye|·X = ${absXe}Y − ${absYe}X<br>`+
    `<span class="fvx">F ≥ 0</span>：偏上，进给 <span class="fvx">${signX}X</span>，F<sub>新</sub>=F−${absYe}<br>`+
    `<span class="fvy">F &lt; 0</span>：偏下，进给 <span class="fvy">${signY}Y</span>，F<sub>新</sub>=F+${absXe}<br>`+
    `<span style="color:var(--text-dim);font-size:11px">总步数 N = |Xe|+|Ye| = ${absXe+absYe}</span>`;
}

function setLinePreset(xe,ye){
  document.getElementById('lxe').value=xe;
  document.getElementById('lye').value=ye;
  updateLineQuad();
}

// ================================================================
// 圆弧参数面板更新
// ================================================================
function updateArcInfo(){
  let xs=num('axs',5),ys=num('ays',0);
  let q=getArcQuadrant(xs,ys);
  let qNames=['','第I象限','第II象限','第III象限','第IV象限'];
  let badge=document.getElementById('arc-quad-badge');
  if(badge)badge.textContent=`起点${qNames[q]}`;
  updateArcFormula();
}

function updateArcFormula(){
  let xs=num('axs',5),ys=num('ays',0);
  let q=getArcQuadrant(xs,ys);
  let el=document.getElementById('arc-fb');
  if(!el)return;
  // 显示当前象限下 NR/SR 的进给规则
  let rules=getArcRules(q,arcDir);
  el.innerHTML=
    `起点象限: 第${['','I','II','III','IV'][q]}象限 | ${arcDir==='NR'?'逆圆 NR':'顺圆 SR'}<br>`+
    `<span class="fvx">F ≥ 0</span>：${rules.geq}<br>`+
    `<span class="fvy">F &lt; 0</span>：${rules.lt}`;
}

function getArcRules(quadrant,dir){
  // 逐点比较法圆弧插补各象限进给规则
  // 参考《数控机床原理与应用》标准规则表
  const rules={
    NR:{
      1:{geq:'进给 −X, F_new=F−2X+1',  lt:'进给 +Y, F_new=F+2Y+1'},
      2:{geq:'进给 −Y, F_new=F−2Y+1',  lt:'进给 −X, F_new=F−2X+1'},
      3:{geq:'进给 +X, F_new=F+2X+1',  lt:'进给 −Y, F_new=F−2Y+1'},
      4:{geq:'进给 +Y, F_new=F+2Y+1',  lt:'进给 +X, F_new=F+2X+1'},
    },
    SR:{
      1:{geq:'进给 −Y, F_new=F−2Y+1',  lt:'进给 +X, F_new=F+2X+1'},
      2:{geq:'进给 +X, F_new=F+2X+1',  lt:'进给 +Y, F_new=F+2Y+1'},
      3:{geq:'进给 +Y, F_new=F+2Y+1',  lt:'进给 −X, F_new=F−2X+1'},
      4:{geq:'进给 −X, F_new=F−2X+1',  lt:'进给 −Y, F_new=F−2Y+1'},
    }
  };
  return rules[dir][quadrant]||rules[dir][1];
}

function setArcPreset(xs,ys,xe,ye,dir){
  document.getElementById('axs').value=xs;
  document.getElementById('ays').value=ys;
  document.getElementById('axe').value=xe;
  document.getElementById('aye').value=ye;
  arcDir=dir;
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('dir-'+dir.toLowerCase()).classList.add('active');
  updateArcInfo();
}

// ================================================================
// 模式切换
// ================================================================
function setMode(m){
  mode=m;
  document.getElementById('bml').classList.toggle('active',m==='line');
  document.getElementById('bma').classList.toggle('active',m==='arc');
  document.getElementById('lc').style.display=m==='line'?'block':'none';
  document.getElementById('ac').style.display=m==='arc'?'block':'none';
  resetSim();
  if(m==='line')updateLineQuad();
  else updateArcInfo();
}

function setDir(d,el){
  arcDir=d;
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  updateArcFormula();
}

// ================================================================
// 算法：全象限直线插补
// 原理：坐标变换为 |Xe|,|Ye|，偏差计算同第一象限；进给方向按象限映射
// ================================================================
function calcLine(xe,ye){
  let absXe=Math.abs(xe),absYe=Math.abs(ye);
  let signX=xe>=0?1:-1, signY=ye>=0?1:-1;
  let q=getLineQuadrant(xe,ye);
  let s=[],x=0,y=0,F=0,N=absXe+absYe;
  s.push({i:0,x,y,F,feed:'—',nF:0,rem:N,judge:'初始化',
    det:`起点(0,0)，终点(${xe},${ye})，${q.label}<br>总步数 N = |${xe}|+|${ye}| = ${N}，F₀ = 0`});
  for(let k=1;k<=N;k++){
    let oF=F,feed,nF,dx=0,dy=0,judge;
    if(F>=0){
      judge=`F≥0 → 偏上，进给 ${signX>0?'+':'-'}X`;
      feed=signX>0?'+X':'−X'; nF=F-absYe; dx=signX;
    } else {
      judge=`F<0 → 偏下，进给 ${signY>0?'+':'-'}Y`;
      feed=signY>0?'+Y':'−Y'; nF=F+absXe; dy=signY;
    }
    F=nF; x+=dx; y+=dy;
    s.push({i:k,x,y,F,feed,nF,rem:N-k,judge,oF,
      det:`F=${oF}(${oF>=0?'≥0':'<0'}) → ${judge} → F_new=${oF}${feed.includes('X')?'−'+absYe:'+'+absXe}=${nF}`});
  }
  return s;
}

// ================================================================
// 算法：全象限圆弧插补（逐点比较法标准规则表）
// 偏差 F = X²+Y²-R²，各象限进给方向不同，自动处理象限转换
// ================================================================
function calcArc(xs,ys,xe,ye,dir){
  let R2=xs*xs+ys*ys;
  let N=Math.abs(xe-xs)+Math.abs(ye-ys);
  let s=[],x=xs,y=ys,F=0;
  let qNames=['','I','II','III','IV'];
  s.push({i:0,x,y,F,feed:'—',nF:0,rem:N,judge:'初始化',quadrant:getArcQuadrant(x,y),
    det:`起点(${xs},${ys})，终点(${xe},${ye})<br>R²=${R2}，总步数 N=${N}，F₀=0`});

  for(let k=1;k<=N;k++){
    let oF=F,oX=x,oY=y;
    let q=getArcQuadrant(x,y);
    let feed,nF,dx=0,dy=0,judge;

    if(dir==='NR'){
      switch(q){
        case 1: if(F>=0){feed='−X';nF=F-2*x+1;dx=-1;judge='F≥0→偏外，−X';}else{feed='+Y';nF=F+2*y+1;dy=1;judge='F<0→偏内，+Y';}break;
        case 2: if(F>=0){feed='−Y';nF=F-2*y+1;dy=-1;judge='F≥0→偏外，−Y';}else{feed='−X';nF=F-2*x+1;dx=-1;judge='F<0→偏内，−X';}break;
        case 3: if(F>=0){feed='+X';nF=F+2*x+1;dx=1;judge='F≥0→偏外，+X';}else{feed='−Y';nF=F-2*y+1;dy=-1;judge='F<0→偏内，−Y';}break;
        case 4: if(F>=0){feed='+Y';nF=F+2*y+1;dy=1;judge='F≥0→偏外，+Y';}else{feed='+X';nF=F+2*x+1;dx=1;judge='F<0→偏内，+X';}break;
        default: feed='—';nF=F;
      }
    } else { // SR
      switch(q){
        case 1: if(F>=0){feed='−Y';nF=F-2*y+1;dy=-1;judge='F≥0→偏外，−Y';}else{feed='+X';nF=F+2*x+1;dx=1;judge='F<0→偏内，+X';}break;
        case 2: if(F>=0){feed='+X';nF=F+2*x+1;dx=1;judge='F≥0→偏外，+X';}else{feed='+Y';nF=F+2*y+1;dy=1;judge='F<0→偏内，+Y';}break;
        case 3: if(F>=0){feed='+Y';nF=F+2*y+1;dy=1;judge='F≥0→偏外，+Y';}else{feed='−X';nF=F-2*x+1;dx=-1;judge='F<0→偏内，−X';}break;
        case 4: if(F>=0){feed='−X';nF=F-2*x+1;dx=-1;judge='F≥0→偏外，−X';}else{feed='−Y';nF=F-2*y+1;dy=-1;judge='F<0→偏内，−Y';}break;
        default: feed='—';nF=F;
      }
    }
    F=nF; x+=dx; y+=dy;
    let qAfter=getArcQuadrant(x,y);
    s.push({i:k,x,y,F,feed,nF,rem:N-k,judge,oF,oX,oY,quadrant:q,qAfter,
      det:`Q${qNames[q]} F=${oF}(${oF>=0?'≥0':'<0'}) → ${judge} → F_new=${nF}`});
  }
  return s;
}

// ================================================================
// 仿真控制
// ================================================================
function initSim(){
  stopAuto(); steps=[];
  if(mode==='line'){
    let xe=clamp(num('lxe',6),-30,30), ye=clamp(num('lye',4),-30,30);
    if(xe===0&&ye===0){alert('终点不能为原点');return;}
    steps=calcLine(xe,ye);
  } else {
    let xs=clamp(num('axs',5),-25,25), ys=clamp(num('ays',0),-25,25);
    let xe=clamp(num('axe',0),-25,25), ye=clamp(num('aye',5),-25,25);
    let R2s=xs*xs+ys*ys, R2e=xe*xe+ye*ye;
    if(Math.abs(R2s-R2e)>2){
      if(!confirm(`起终点到原点距离差较大（R_s²=${R2s}, R_e²=${R2e}），可能不在同一圆上，继续吗？`))return;
    }
    steps=calcArc(xs,ys,xe,ye,arcDir);
  }
  inited=true; cur=0;
  renderStep(0); updTbl(0);
  setSt('已初始化，准备开始');
}

function stepOnce(){
  if(!inited)initSim();
  if(cur>=steps.length-1){setSt('⚠️ 请重置或应用');return;}
  cur++; renderStep(cur); updTbl(cur);
  if(cur===steps.length-1){setSt('✅ 插补完成！');stopAuto();}
  else if(!running)setSt('👣 单步推演中...');
}

function startAuto(){
  if(!inited)initSim();
  if(cur>=steps.length-1){setSt('⚠️ 请重置或应用');return;}
  if(running){stopAuto();return;}
  running=true;
  document.getElementById('bta').innerHTML='⏸ 暂停';
  document.getElementById('bta').classList.add('running');
  setSt('▶ 正在运行中...'); tick();
}

function tick(){
  if(!running)return;
  stepOnce();
  if(cur>=steps.length-1){stopAuto();return;}
  timer=setTimeout(tick,2100-num('speed',800));
}

function stopAuto(){
  running=false; clearTimeout(timer);
  document.getElementById('bta').innerHTML='▶ 自动';
  document.getElementById('bta').classList.remove('running');
  if(inited&&cur>0&&cur<steps.length-1)setSt('⏸ 已暂停');
}

function resetSim(){
  stopAuto(); inited=false; cur=-1; steps=[];
  document.getElementById('tb').innerHTML='<tr><td colspan="8" style="color:var(--text-dim);padding:40px;text-align:center;font-size:15px">请应用参数后开始演示</td></tr>';
  document.getElementById('dc').innerHTML='等待开始演示…';
  ['ss','sx','sy','sf','sn'].forEach(id=>{let el=document.getElementById(id);if(el)el.textContent='—';});
  setSt('等待开始'); drawGrid();
}

function setSt(t){
  let e=document.getElementById('st-badge');
  if(!e)return;
  e.innerHTML=t;
  if(t.includes('完成')){e.style.background='var(--green-lt)';e.style.color='var(--green)';}
  else if(t.includes('运行')||t.includes('推演')){e.style.background='var(--accent-lt)';e.style.color='var(--accent)';}
  else if(t.includes('⚠️')){e.style.background='var(--orange-lt)';e.style.color='var(--orange)';}
  else{e.style.background='var(--surface2)';e.style.color='var(--text-mid)';}
}

// ================================================================
// 渲染步骤
// ================================================================
function renderStep(idx){
  let s=steps[idx];
  document.getElementById('ss').textContent=s.i;
  document.getElementById('sx').textContent=s.x;
  document.getElementById('sy').textContent=s.y;
  document.getElementById('sf').textContent=s.F;
  document.getElementById('sn').textContent=s.rem;

  let dc=document.getElementById('dc');
  if(idx===0){
    dc.innerHTML=`<div style="color:var(--text-mid);font-size:14px;line-height:1.9;font-weight:600;padding:8px 0">${s.det}</div>`;
  } else {
    let pos=s.oF>=0;
    let isXfeed=s.feed.includes('X');
    let fc=isXfeed?'var(--x-color)':'var(--y-color)';
    let qLabel=s.quadrant?`第${'IIIIIIIV'.slice((s.quadrant-1)*2,(s.quadrant-1)*2+['I','II','III','IV'][s.quadrant-1].length)}象限`:'';
    // nicer quadrant display
    let qMap=['','第I象限','第II象限','第III象限','第IV象限'];
    dc.innerHTML=`
      <div class="drow"><div class="dlbl"><div class="dnum">1</div>偏差判别</div><div class="dval" style="color:${pos?'var(--accent)':'var(--red)'}">F = ${s.oF} &nbsp; ${pos?'≥ 0':'< 0'}</div></div>
      <div style="margin:0 0 8px 32px;font-size:12px;color:var(--text-dim)">${s.judge}${s.quadrant?'（'+qMap[s.quadrant]+'）':''}</div>
      <div class="drow"><div class="dlbl"><div class="dnum">2</div>坐标进给</div><div class="dval" style="color:${fc}">进给 &nbsp;${s.feed}</div></div>
      <div class="drow"><div class="dlbl"><div class="dnum">3</div>偏差更新</div><div class="dval">F_new = <span style="color:var(--accent)">${s.nF}</span></div></div>
      <div class="drow"><div class="dlbl"><div class="dnum">4</div>终点判别</div><div class="dval" style="color:${s.rem===0?'var(--green)':'var(--text)'}">余 ${s.rem} 步 ${s.rem===0?'&nbsp;✅ 终点！':''}</div></div>
      <div class="dnote" style="font-size:11px">${s.det}</div>`;
  }
  drawScene(idx);
}

function updTbl(idx){
  let tb=document.getElementById('tb'); tb.innerHTML='';
  for(let i=0;i<=idx;i++){
    let s=steps[i]; let tr=document.createElement('tr'); tr.id=`r${i}`;
    let fc=s.feed==='—'?'var(--text-dim)':s.feed.includes('X')?'var(--x-color)':'var(--y-color)';
    let fBg=i>0&&s.oF>=0?'var(--accent)':'var(--red)';
    tr.innerHTML=`
      <td style="font-weight:700;color:var(--text-mid)">${s.i}</td>
      <td style="color:${i>0?fBg:'var(--text-dim)'}">${i>0?s.oF:0}</td>
      <td style="font-size:11px">${s.i===0?'初始':s.oF>=0?'≥0':'<0'}</td>
      <td style="color:${fc};font-weight:700;font-size:14px">${s.feed}</td>
      <td>${s.F}</td>
      <td style="color:var(--x-color);font-weight:700">${s.x}</td>
      <td style="color:var(--y-color);font-weight:700">${s.y}</td>
      <td style="color:${s.rem===0?'var(--green)':'var(--text-mid)'};font-weight:${s.rem===0?700:500}">${s.rem}${s.rem===0?' ✓':''}</td>`;
    if(i===idx)tr.classList.add('cur'); else tr.classList.add('done');
    tb.appendChild(tr);
  }
  let r=document.getElementById(`r${idx}`),twrap=document.querySelector('.twrap');
  if(r&&twrap){let t=Math.max(0,r.offsetTop-twrap.clientHeight/2+40);twrap.scrollTo({top:t,behavior:'smooth'});}
}

// ================================================================
// 画布工具
// ================================================================
function resize(){
  let wrap=cv.parentElement;
  let w=wrap.clientWidth,h=wrap.clientHeight;
  if(w===0||h===0)return;
  canvasW=w; canvasH=h;
  let dpr=window.devicePixelRatio||1;
  cv.width=w*dpr; cv.height=h*dpr;
  ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
  if(inited)drawScene(cur); else drawGrid();
}

function gp(){
  let xe,ye,xs=0,ys=0;
  if(mode==='line'){xe=num('lxe',6);ye=num('lye',4);}
  else{xs=num('axs',5);ys=num('ays',0);xe=num('axe',0);ye=num('aye',5);}
  let w=canvasW||cv.parentElement.clientWidth||300;
  let h=canvasH||cv.parentElement.clientHeight||300;
  if(w<100)w=window.innerWidth||300;
  if(h<100)h=380;
  let isMobile=w<600;
  let maxCoord=Math.max(Math.abs(xe),Math.abs(ye),Math.abs(xs),Math.abs(ys),1);
  let mc=Math.max(maxCoord+2,isMobile?7:9);
  let span=mc*2;
  let mgX=isMobile?8:50,mgY=isMobile?32:50;
  let gs=Math.max(1,Math.min((w-mgX*2)/span,(h-mgY*2)/span));
  let ox=w/2,oy=h/2;
  return{mc,gs,ox,oy,isMobile};
}

function toC(gx,gy){
  let{gs,ox,oy}=gp();return{cx:ox+gx*gs,cy:oy-gy*gs};
}

// ================================================================
// 绘制坐标网格（四象限彩色底色 + 象限标签贴角）
// ================================================================
function drawGrid(){
  let{mc,gs,ox,oy,isMobile}=gp();
  ctx.clearRect(0,0,canvasW,canvasH);

  let gLeft=ox-mc*gs,gRight=ox+mc*gs;
  let gTop=oy-mc*gs,gBottom=oy+mc*gs;

  // 四象限底色
  let qColors=['#eef7ff','#f5f0ff','#fff5f0','#f0fff8'];
  ctx.fillStyle=qColors[0];ctx.fillRect(ox,gTop,gRight-ox,oy-gTop);       // I
  ctx.fillStyle=qColors[1];ctx.fillRect(gLeft,gTop,ox-gLeft,oy-gTop);     // II
  ctx.fillStyle=qColors[2];ctx.fillRect(gLeft,oy,ox-gLeft,gBottom-oy);    // III
  ctx.fillStyle=qColors[3];ctx.fillRect(ox,oy,gRight-ox,gBottom-oy);      // IV

  // 象限标签（各象限外角）
  if(!isMobile){
    ctx.font='bold 12px Noto Sans SC,sans-serif';
    ctx.fillStyle='rgba(100,116,139,0.5)';
    let pad=10;
    ctx.textAlign='right';ctx.textBaseline='top';    ctx.fillText('I',gRight-pad,gTop+pad);
    ctx.textAlign='left'; ctx.textBaseline='top';    ctx.fillText('II',gLeft+pad,gTop+pad);
    ctx.textAlign='left'; ctx.textBaseline='bottom'; ctx.fillText('III',gLeft+pad,gBottom-pad);
    ctx.textAlign='right';ctx.textBaseline='bottom'; ctx.fillText('IV',gRight-pad,gBottom-pad);
  }

  // 边框
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  ctx.strokeRect(gLeft,gTop,gRight-gLeft,gBottom-gTop);

  // 网格线
  ctx.beginPath();ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  for(let i=-mc+1;i<mc;i++){
    if(i===0)continue;
    ctx.moveTo(ox+i*gs,gTop);ctx.lineTo(ox+i*gs,gBottom);
    ctx.moveTo(gLeft,oy-i*gs);ctx.lineTo(gRight,oy-i*gs);
  }ctx.stroke();

  // 坐标轴
  ctx.strokeStyle='#94a3b8';ctx.lineWidth=1.5;ctx.beginPath();
  let axExt=isMobile?6:20;
  ctx.moveTo(gLeft-axExt,oy);ctx.lineTo(gRight+axExt,oy);
  ctx.moveTo(ox,gBottom+axExt);ctx.lineTo(ox,gTop-axExt);
  ctx.stroke();

  // 箭头
  ctx.fillStyle='#94a3b8';
  let arrSize=isMobile?8:10;
  let ar=(x,y,d)=>{
    ctx.beginPath();
    if(d==='r'){ctx.moveTo(x-arrSize/2,y-arrSize/2);ctx.lineTo(x+arrSize,y);ctx.lineTo(x-arrSize/2,y+arrSize/2);}
    else{ctx.moveTo(x-arrSize/2,y+arrSize/2);ctx.lineTo(x,y-arrSize);ctx.lineTo(x+arrSize/2,y+arrSize/2);}
    ctx.fill();
  };
  ar(gRight+axExt,oy,'r');ar(ox,gTop-axExt,'u');

  // 轴标签
  ctx.font=isMobile?'bold 13px Noto Sans SC':'bold 14px Noto Sans SC';
  ctx.fillStyle='#64748b';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('X',gRight+axExt+(isMobile?10:14),oy);
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText('Y',ox,gTop-axExt-(isMobile?8:12));

  // 刻度数字（X轴正方向+Y轴正方向）
  ctx.font=isMobile?'9px JetBrains Mono':'11px JetBrains Mono';
  ctx.fillStyle='#94a3b8';ctx.textAlign='center';ctx.textBaseline='middle';
  let step=1;if(mc>12)step=2;if(mc>25)step=5;
  for(let i=1;i<=mc;i++){
    if(i%step!==0)continue;
    ctx.fillText(i,ox+i*gs,oy+12);
    ctx.fillText(-i,ox-i*gs,oy+12);
  }
  ctx.textAlign='right';
  for(let i=1;i<=mc;i++){
    if(i%step!==0)continue;
    ctx.fillText(i,ox-6,oy-i*gs);
    ctx.fillText(-i,ox-6,oy+i*gs);
  }
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}

// ================================================================
// 绘制场景
// ================================================================
function drawScene(idx){
  if(!inited||!steps.length)return;
  drawGrid();
  let{gs,isMobile}=gp();

  // ── 理想轨迹 ──
  if(mode==='line'){
    let xe=num('lxe',6),ye=num('lye',4);
    let p0=toC(0,0),pe=toC(xe,ye);
    ctx.save();ctx.strokeStyle='rgba(107,114,128,0.5)';ctx.lineWidth=isMobile?2:2.5;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(p0.cx,p0.cy);ctx.lineTo(pe.cx,pe.cy);ctx.stroke();ctx.restore();
    // 终点标记
    let{cx,cy}=pe;
    ctx.fillStyle='#16a34a';ctx.beginPath();ctx.arc(cx,cy,isMobile?6:9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font=isMobile?'bold 10px Noto Sans SC':'bold 11px Noto Sans SC';
    ctx.textAlign='center';ctx.fillText('终',cx,cy+(isMobile?3:4));
    // 起点标记
    let op=toC(0,0);
    ctx.fillStyle='#7c3aed';ctx.beginPath();ctx.arc(op.cx,op.cy,isMobile?6:9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.fillText('起',op.cx,op.cy+(isMobile?3:4));
    ctx.textAlign='left';
  } else {
    let xs=num('axs',5),ys=num('ays',0),xe=num('axe',0),ye=num('aye',5);
    let R=Math.sqrt(xs*xs+ys*ys),cc=toC(0,0);
    ctx.save();ctx.strokeStyle='rgba(107,114,128,0.5)';ctx.lineWidth=isMobile?2:2.5;ctx.setLineDash([6,4]);
    ctx.beginPath();
    ctx.arc(cc.cx,cc.cy,Math.max(0,R*gs),-Math.atan2(ys,xs),-Math.atan2(ye,xe),arcDir==='NR');
    ctx.stroke();ctx.restore();
    let ps=toC(xs,ys),pe=toC(xe,ye);
    ctx.fillStyle='#7c3aed';ctx.beginPath();ctx.arc(ps.cx,ps.cy,isMobile?6:9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#16a34a';ctx.beginPath();ctx.arc(pe.cx,pe.cy,isMobile?6:9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font=isMobile?'bold 10px Noto Sans SC':'bold 11px Noto Sans SC';
    ctx.textAlign='center';
    ctx.fillText('起',ps.cx,ps.cy+(isMobile?3:4));
    ctx.fillText('终',pe.cx,pe.cy+(isMobile?3:4));
    ctx.textAlign='left';
  }

  // ── 已走路径 ──
  if(idx>0){
    ctx.strokeStyle='#7c3aed';ctx.lineWidth=isMobile?2.5:3.5;
    ctx.beginPath();
    let s0=toC(steps[0].x,steps[0].y);ctx.moveTo(s0.cx,s0.cy);
    for(let i=1;i<=idx;i++){let p=toC(steps[i].x,steps[i].y);ctx.lineTo(p.cx,p.cy);}
    ctx.stroke();

    // 进给方向点标记
    for(let i=1;i<=idx;i++){
      let s=steps[i];
      if(s.feed&&s.feed!=='—'){
        let p=toC(s.x,s.y);
        let isX=s.feed.includes('X');
        ctx.fillStyle=isX?'rgba(37,99,235,0.35)':'rgba(13,148,136,0.35)';
        ctx.beginPath();
        ctx.rect(p.cx-(isMobile?3.5:5),p.cy-(isMobile?3.5:5),isMobile?7:10,isMobile?7:10);
        ctx.fill();
      }
    }

    // 最新一步方向箭头
    let pr=steps[idx-1],cr=steps[idx];
    if(pr.x!==cr.x||pr.y!==cr.y){
      let pp=toC(pr.x,pr.y),cp=toC(cr.x,cr.y);
      let isX=Math.abs(cr.x-pr.x)>0;
      ctx.strokeStyle=isX?'#2563eb':'#0d9488';ctx.lineWidth=isMobile?3:4;
      ctx.beginPath();ctx.moveTo(pp.cx,pp.cy);ctx.lineTo(cp.cx,cp.cy);ctx.stroke();
      let ang=Math.atan2(cp.cy-pp.cy,cp.cx-pp.cx);
      ctx.fillStyle=isX?'#2563eb':'#0d9488';ctx.beginPath();ctx.moveTo(cp.cx,cp.cy);
      let arrSpan=isMobile?10:14;
      ctx.lineTo(cp.cx-arrSpan*Math.cos(ang-0.4),cp.cy-arrSpan*Math.sin(ang-0.4));
      ctx.lineTo(cp.cx-arrSpan*Math.cos(ang+0.4),cp.cy-arrSpan*Math.sin(ang+0.4));
      ctx.fill();
    }

    // 刀具当前位置
    let sc=steps[idx],pc=toC(sc.x,sc.y);
    ctx.fillStyle='#ea580c';
    let toolR=isMobile?5:7.5;
    ctx.beginPath();ctx.arc(pc.cx,pc.cy,toolR,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffffff';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(pc.cx,pc.cy,toolR,0,Math.PI*2);ctx.stroke();

    // 坐标标注
    ctx.font=isMobile?'bold 12px JetBrains Mono':'bold 14px JetBrains Mono';
    ctx.strokeStyle='#ffffff';ctx.lineWidth=3;
    ctx.strokeText(`(${sc.x}, ${sc.y})`,pc.cx+12,pc.cy-10);
    ctx.fillStyle='#7c3aed';
    ctx.fillText(`(${sc.x}, ${sc.y})`,pc.cx+12,pc.cy-10);
  }

  // 原点
  let orig=toC(0,0);
  ctx.fillStyle='#4b5563';ctx.beginPath();ctx.arc(orig.cx,orig.cy,isMobile?3:5,0,Math.PI*2);ctx.fill();
}

// ================================================================
// 初始化
// ================================================================
window.addEventListener('resize',resize);
resize();drawGrid();
setTimeout(()=>{resize();drawGrid();},150);
updateLineQuad();
updateArcInfo();
</script>
